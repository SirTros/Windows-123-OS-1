
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Windows123 desktop</title>
<style>
body, html {
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial,sans-serif;
background-image:url('Pictures/Pozadi.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
user-select:none;
}

#desktop{
width:100%;
height:100%;
position:relative;
padding-bottom:50px;
}

.icon{
width:60px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
cursor:pointer;
position:absolute;
border-radius:6px;
color:white;
text-align:center;
}

.icon:hover{
background:rgba(255,255,255,0.2);
}

.icon span{
font-size:36px;
user-select:none;
}

.icon label{
margin-top:4px;
font-size:12px;
line-height:14px;
user-select:none;
white-space:normal;
word-break:break-word;
max-width:60px;
}

.app-window{
position:fixed;
background:#f0f0f0;
border:2px solid #333;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.4);
z-index:1000;
display:flex;
flex-direction:column;
overflow:hidden;
}

.app-header{
background:#333;
color:white;
padding:5px 10px;
cursor:move;
user-select:none;
display:flex;
justify-content:space-between;
align-items:center;
font-weight:bold;
}

.app-close-btn{
background:none;
border:none;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
line-height:1;
user-select:none;
}

#text-app textarea{
flex-grow:1;
padding:10px;
border:none;
resize:none;
font-size:16px;
font-family:monospace;
outline:none;
width:100%;
box-sizing:border-box;
}

#calc-app{
width:250px;
display:none;
flex-direction:column;
}

#calc-display{
width:100%;
font-size:24px;
padding:8px;
text-align:right;
margin:10px 0;
border:1px solid #ccc;
border-radius:4px;
box-sizing:border-box;
}

#calc-buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:5px;
padding:10px;
}

#calc-buttons button{
font-size:18px;
padding:10px;
cursor:pointer;
border-radius:4px;
border:1px solid #999;
background:white;
user-select:none;
transition:background-color 0.2s;
}

#calc-clear{
grid-column:span 4;
background:#f44336;
color:black;
font-weight:bold;
border:none;
}

#taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:50px;
background-color:#202020;
display:flex;
align-items:center;
padding:0 10px;
user-select:none;
z-index:2000;
justify-content:space-between;
}

#start-button{
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
user-select:none;
height:50px;
width:50px;
}

#start-button img{
height:30px;
width:30px;
object-fit:contain;
display:block;
}

#datetime{
color:white;
margin-right:10px;
font-size:12px;
font-weight:bold;
display:flex;
flex-direction:column;
justify-content:center;
height:50px;
user-select:none;
text-align:right;
}

#datetime #time{
font-size:16px;
line-height:1;
}

#datetime #date{
font-size:12px;
line-height:1;
}

#taskmanager-app{
width:600px;
height:600px;
display:none;
flex-direction:column;
}

.tm-content{
background:#fff;
color:#111;
flex:1;
padding:15px;
font-family:"Segoe UI";
}

.tm-header{
font-size:22px;
margin-bottom:15px;
}

.tm-box{
background:#eee;
border-radius:10px;
padding:12px;
margin-bottom:10px;
}

.tm-process{
display:flex;
justify-content:space-between;
padding:8px;
border-bottom:1px solid #ccc;
}


#files-app{
width:320px;
height:360px;
display:none;
flex-direction:column;
position:fixed;
top:80px;
left:120px;
background:#f0f0f0;
border:2px solid #333;
border-radius:8px;
box-shadow:0 0 12px rgba(0,0,0,0.4);
z-index:1000;
overflow-y:auto;
padding:10px;
box-sizing:border-box;
}


#files-list{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
}


#files-list .file-icon{
width:60px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
cursor:pointer;
user-select:none;
color:black;
border-radius:6px;
text-align:center;
}


#files-list .file-icon span{
font-size:36px;
user-select:none;
}


#files-list .file-icon label{
font-size:12px;
margin-top:4px;
white-space:normal;
word-break:break-word;
max-width:60px;
color:black;
}


#files-list .file-icon:hover{
background:rgba(0,0,0,0.1);
}


#toastContainer{
position:fixed;
top:10px;
right:10px;
z-index:9999;
}


.toast{
background:#fff;
color:#000;
padding:10px 20px;
border-radius:5px;
box-shadow:0 0 5px black;
font-family:monospace;
opacity:0;
transition:opacity 0.3s;
}


#volume-toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(50,50,50,0.9);
color:white;
padding:8px 16px;
border-radius:8px;
font-size:16px;
display:none;
z-index:5000;
}


#terminal-output,
#terminal-input{
font-family:'Press Start 2P',monospace;
}


#start-menu-new{
position:fixed;
bottom:60px;
left:10px;
width:340px;
height:450px;
background:#111;
color:white;
border:1px solid #555;
border-radius:18px;
display:flex;
flex-direction:column;
padding:15px;
z-index:5000;
font-family:"Segoe UI";
box-shadow:0 10px 30px #000;

transform:translateY(40px) scale(.95);
opacity:0;
pointer-events:none;
transition:0.25s ease;
}


#start-menu-new.open{
transform:translateY(0) scale(1);
opacity:1;
pointer-events:auto;
}


#start-search{
height:35px;
border-radius:10px;
border:1px solid #555;
background:#222;
color:white;
padding:0 12px;
font-size:16px;
}


#start-apps{
flex:1;
overflow-y:auto;
margin-top:10px;
scroll-behavior:smooth;
}


.start-app{
display:flex;
align-items:center;
gap:12px;
padding:10px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}


.start-app:hover{
background:#333;
}


#start-bottom{
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
padding-top:10px;
border-top:1px solid #444;
}


#user-box{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
}


#user-box img{
width:38px;
height:38px;
border-radius:50%;
background:white;
padding:3px;
box-sizing:border-box;
}

#power-button{
font-size:28px;
cursor:pointer;
padding:8px;
border-radius:10px;
}


#power-button:hover{
background:#333;
}

#power-menu{
position:absolute;
right:0;
bottom:55px;

display:flex;
flex-direction:column;
gap:5px;

background:#222;
border:1px solid #555;
border-radius:12px;
padding:8px;

width:150px;

box-shadow:0 5px 20px #000;

opacity:0;
transform:translateY(20px) scale(.95);
pointer-events:none;
transition:.2s ease;
}


#power-menu.open{
opacity:1;
transform:translateY(0) scale(1);
pointer-events:auto;
}


#power-menu button{
width:100%;
background:none;
border:0;
color:white;
padding:10px;
text-align:left;
border-radius:8px;
cursor:pointer;
}


#power-menu button:hover{
background:#444;
}


#start-menu{
transform:translateY(20px) scale(.95);
opacity:0;
pointer-events:none;
transition:.2s ease;
}


#start-menu.open{
transform:translateY(0) scale(1);
opacity:1;
pointer-events:auto;
}


#start-menu button{
background:none;
border:none;
padding:10px;
font-size:14px;
cursor:pointer;
border-bottom:1px solid #ccc;
text-align:left;
}


#start-menu button:last-child{
border-bottom:none;
}


#start-menu button:hover{
background:#eee;
}


#start-apps::-webkit-scrollbar{
width:8px;
}


#start-apps::-webkit-scrollbar-thumb{
background:#666;
border-radius:10px;
}


.tm-list{
margin-top:10px;
}


.tm-system{
color:red;
font-weight:bold;
}


.tm-button{
padding:8px 15px;
border-radius:8px;
border:none;
cursor:pointer;
}


</style>
</head>
<body>

<script>

// ===== Windows123 Task Manager JS =====

const iconTaskmanager = document.getElementById("icon-taskmanager");
const taskmanagerApp = document.getElementById("taskmanager-app");
const taskmanagerClose = document.getElementById("taskmanager-close");

iconTaskmanager.ondblclick = () => {
    showApp(taskmanagerApp);
    updateTaskManager();
};


// zavření okna
taskmanagerClose.onclick = () => {
    taskmanagerApp.style.display = "none";
};


// seznam procesů
function updateTaskManager(){

    let processes = [
        {
            name:"Windows123 Desktop",
            state:"Running"
        },
        {
            name:"Notepad",
            state:textApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Calculator",
            state:calcApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Paint",
            state:paintApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Clock",
            state:clockApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Terminal",
            state:terminalApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Files",
            state:filesApp.style.display === "flex" ? "Running" : "Suspended"
        },
        {
            name:"Task Manager",
            state:taskmanagerApp.style.display === "flex" ? "Running" : "Suspended"
        },
    ];


    let list = document.getElementById("tm-processes");

    list.innerHTML = "";


    processes.forEach(process => {

        list.innerHTML += `
        <div class="tm-process">
            <span>${process.name}</span>
            <span>${process.state}</span>
        </div>
        `;

    });


    // simulace výkonu
    let cpu = Math.floor(Math.random()*20)+5;
    let ram = Math.floor(Math.random()*30)+35;


    document.getElementById("tm-cpu").textContent = cpu + "%";
    document.getElementById("tm-ram").textContent = ram + "%";

}


// automatický refresh
setInterval(()=>{

    if(taskmanagerApp.style.display === "flex"){
        updateTaskManager();
    }

},2000);


// restart pouze Windows123 plochy
function restartDesktop(){

    document.body.style.opacity="0";

    setTimeout(()=>{

        [
        textApp,
        calcApp,
        paintApp,
        terminalApp,
        clockApp
        ].forEach(app=>{
            app.style.display="none";
        });


        document.body.style.opacity="1";

    },800);

}


function restartDesktop(){

alert("Restarting Windows123 Desktop...");

location.reload();

}

const iconFiles = document.getElementById('icon-files'),
      iconText = document.getElementById('icon-text'),
      iconCalc = document.getElementById('icon-calc'),
      iconPaint = document.getElementById('icon-paint'),
      iconTerminal = document.getElementById('icon-terminal'),
      iconClock = document.getElementById('icon-clock');

const filesApp = document.getElementById('files-app'),
      textApp = document.getElementById('text-app'),
      calcApp = document.getElementById('calc-app'),
      paintApp = document.getElementById('paint-app'),
      terminalApp = document.getElementById('terminal-app'),
      clockApp = document.getElementById('clock-app');

const textArea = textApp.querySelector('textarea'),
      filesList = document.getElementById('files-list');

const appsForFiles = [
    {name:'Files', icon:'📁', appEl: filesApp},
    {name:'Notepad', icon:'📄', appEl: textApp},
    {name:'Calculator', icon:'🧮', appEl: calcApp},
    {name:'Paint', icon:'🎨', appEl: paintApp},
    {name:'Terminal', icon:'📟', appEl: terminalApp},
    {name:'Clock', icon:'🕒', appEl: clockApp},
    {name:'Task Manager', icon:'📊', appEl: taskmanagerApp}
];

// --- Load saved text and populate Files app ---
window.addEventListener('load', () => {
    const savedText = localStorage.getItem('textDocument');
    if(savedText) textArea.value = savedText;
    populateFilesApp();
});

textArea.addEventListener('input', () => {
    localStorage.setItem('textDocument', textArea.value);
});

function populateFilesApp() {
    filesList.innerHTML = '';
    appsForFiles.forEach(app => {
        const fileIcon = document.createElement('div');
        fileIcon.className = 'file-icon';
        fileIcon.title = app.name;
        fileIcon.innerHTML = `<span>${app.icon}</span><label>${app.name}</label>`;
        fileIcon.onclick = () => showApp(app.appEl);
        filesList.appendChild(fileIcon);
    });
}

// --- Desktop icons double-click ---
iconFiles.ondblclick = () => showApp(filesApp);
iconText.ondblclick = () => showApp(textApp);
iconCalc.ondblclick = () => showApp(calcApp);
iconPaint.ondblclick = () => showApp(paintApp);
iconTerminal.ondblclick = () => showApp(terminalApp);
iconClock.ondblclick = () => { showApp(clockApp); updateClock(); };

// --- Close buttons ---
document.getElementById('files-app-close').onclick = () => filesApp.style.display='none';
document.getElementById('text-app-close').onclick = () => textApp.style.display='none';
document.getElementById('calc-app-close').onclick = () => calcApp.style.display='none';
document.getElementById('paint-app-close').onclick = () => paintApp.style.display='none';
document.getElementById('terminal-app-close').onclick = () => terminalApp.style.display='none';
document.getElementById('clock-app-close').onclick = () => clockApp.style.display='none';

// --- Show app (all apps can be open without limit) ---
function showApp(app) {
    if(app.style.display === 'flex') return; // Already open
    app.style.display = 'flex';
    bringToFront(app);
}

// --- Draggable windows ---
function makeDraggable(el) {
    const header = el.querySelector('.app-header');
    if(!header) return;
    header.addEventListener('mousedown', e => {
        let offsetX = e.clientX - el.offsetLeft,
            offsetY = e.clientY - el.offsetTop;
        bringToFront(el);
        function onMouseMove(e) {
            el.style.left = (e.clientX - offsetX) + 'px';
            el.style.top = (e.clientY - offsetY) + 'px';
        }
        function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
    });
}

[filesApp, textApp, calcApp, paintApp, terminalApp, clockApp, taskmanagerApp].forEach(makeDraggable);

// --- Bring to front ---
function bringToFront(el) {
    const highestZ = Array.from(document.querySelectorAll('.app-window'))
        .map(e => parseInt(getComputedStyle(e).zIndex) || 0)
        .reduce((max, z) => Math.max(max, z), 1000);
    el.style.zIndex = highestZ + 1;
}

// --- Calculator ---
const calcDisplay = document.getElementById('calc-display');
let currentInput = '';

document.querySelectorAll('.calc-btn').forEach(btn => btn.onclick = () => {
    currentInput += btn.textContent;
    calcDisplay.value = currentInput;
});

document.getElementById('calc-equal').onclick = () => {
    try {
        let expression = currentInput.replace(',', '.');
        let result = Function(`'use strict'; return (${expression})`)();
        calcDisplay.value = result;
        currentInput = result.toString();
    } catch {
        calcDisplay.value = 'ERROR';
        currentInput = '';
    }
};

document.getElementById('calc-clear').onclick = () => { currentInput = ''; calcDisplay.value = ''; };

// --- Clock ---
const clockTime = document.getElementById('clock-time');
const clockDate = document.getElementById('clock-date');

function updateClock() {
    const now = new Date();
    clockTime.textContent = now.toLocaleTimeString("en-GB");
    clockDate.textContent = now.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

setInterval(() => { if(clockApp.style.display === 'flex') updateClock(); }, 1000);

// --- Paint ---
const canvas = document.getElementById('paint-canvas');
const ctx = canvas.getContext('2d');
let drawing = false, lastX = 0, lastY = 0;
const colorPicker = document.getElementById('paint-color');

function savePaintToLocalStorage() { localStorage.setItem('paintImage', canvas.toDataURL()); }
function loadPaintFromLocalStorage() {
    let data = localStorage.getItem('paintImage');
    if(data) {
        let img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0);
        img.src = data;
    }
}
loadPaintFromLocalStorage();

canvas.addEventListener('mousedown', e => { drawing = true; lastX = e.offsetX; lastY = e.offsetY; });
canvas.addEventListener('mousemove', e => {
    if(!drawing) return;
    ctx.strokeStyle = colorPicker.value;
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    lastX = e.offsetX; lastY = e.offsetY;
});
canvas.addEventListener('mouseup', () => { drawing = false; savePaintToLocalStorage(); });
canvas.addEventListener('mouseout', () => { drawing = false; });
document.getElementById('paint-clear-btn').onclick = () => { ctx.clearRect(0,0,canvas.width,canvas.height); localStorage.removeItem('paintImage'); };

function updateDateTime(){
    const now = new Date();

    document.getElementById('time').textContent =
    now.toLocaleTimeString([],{
        hour:'2-digit',
        minute:'2-digit'
    });

    document.getElementById('date').textContent =
    now.toLocaleDateString();
}

updateDateTime();
setInterval(updateDateTime,1000);

// --- Terminal ---
const terminalInput = document.getElementById('terminal-input');
const terminalOutput = document.getElementById('terminal-output');
const commands = ['help','run (app)','time','date','shutdown','restart','lock','echo (text)','about','apps','update','bsod','som'];

terminalInput.addEventListener('keydown', e => { if(e.key==='Enter'){ const cmd = terminalInput.value.trim(); terminalInput.value=''; handleTerminalCommand(cmd); }});

function printTerminal(text) { terminalOutput.innerHTML += '<br>' + text; terminalOutput.scrollTop = terminalOutput.scrollHeight; }

function handleTerminalCommand(cmd) {
    if(!cmd) return;
    const parts = cmd.split(" ");
    const main = parts[0].toLowerCase();
    const arg = parts.slice(1).join(" ");

    switch(main){
        case 'help': printTerminal('Commands: '+commands.join(', ')); break;
        case 'time': printTerminal('Current time: '+new Date().toLocaleTimeString()); break;
        case 'date': printTerminal('Current date: '+new Date().toLocaleDateString()); break;
        case 'about': printTerminal('Windows123 OS 1.8'); break;
        case 'update': printTerminal('Windows123 All OK.'); break;
        case 'apps': printTerminal('Apps: Notepad, Calculator, Paint, Clock, Files, Terminal, Taskmgr'); break;
        case 'echo': if(arg) printTerminal(arg); else printTerminal('Usage: echo [text]'); break;

        case 'run':
            const appName = arg.toLowerCase();
            switch(appName){
                case 'notepad': showApp(textApp); break;
                case 'calculator': showApp(calcApp); break;
                case 'paint': showApp(paintApp); break;
                case 'clock': showApp(clockApp); break;
                case 'files': showApp(filesApp); break;
                case 'terminal': showApp(terminalApp); break;
                case 'cmd': showApp(terminalApp); break;
                case 'taskmgr': showApp(taskmanagerApp); break;
                default: printTerminal('Unknown app: '+appName);
            }
            break;

        case 'shutdown': window.location.href='Vypinani.html'; break;
        case 'restart': window.location.href='Restartovani.html'; break;
        case 'bsod': window.location.href='Start-Error.html'; break;
        case 'som': window.location.href='SOM.html'; break;
        case 'lock': window.location.href='Zamykani.html'; break;
        default: printTerminal('Unknown command: '+main);
    }
}

// --- Allow running commands from console ---
window.runCmdFromConsole = function(cmd){
    handleTerminalCommand(cmd);
    console.log('Command executed in Windows123 CMD: ' + cmd);
};

// --- Alt key spam detection ---
let altCounter = 0, altTimeout = null;
document.addEventListener('keydown', (e) => {
    if(e.key === 'Alt'){
        altCounter++;
        clearTimeout(altTimeout);
        altTimeout = setTimeout(()=>{altCounter=0;},1000);
        if(altCounter >= 10){ altCounter=0; window.location.href='Black.html'; }
    }
});


// ===== Windows123 New Start Menu =====



const newStart = document.getElementById("start-menu-new");
const startButton = document.getElementById("start-button");
const powerButton = document.getElementById("power-button");
const powerMenu = document.getElementById("power-menu");
const search = document.getElementById("start-search");
const appsBox = document.getElementById("start-apps");

search.oninput=()=>{
    let v=search.value.toLowerCase();

    document.querySelectorAll(".start-app").forEach(a=>{
        a.style.display =
        a.textContent.toLowerCase().includes(v)
        ? "flex"
        : "none";
    });
};

const startApps = [
    {name:"Notepad", icon:"📄", app:textApp},
    {name:"Calculator", icon:"🧮", app:calcApp},
    {name:"Paint", icon:"🎨", app:paintApp},
    {name:"Clock", icon:"🕒", app:clockApp},
    {name:"Terminal", icon:"📟", app:terminalApp},
    {name:"Files", icon:"📁", app:filesApp},
    {name:"Task Manager", icon:"📊", app:taskmanagerApp}
];


// vytvoření aplikací v menu
startApps.forEach(a=>{

    let app=document.createElement("div");

    app.className="start-app";

    app.innerHTML=`
    <span style="font-size:25px">${a.icon}</span>
    <span>${a.name}</span>
    `;

    app.onclick=()=>{
        showApp(a.app);
        newStart.classList.remove("open");
    };

    appsBox.appendChild(app);

});


startButton.onclick=(e)=>{
    e.stopPropagation();

    newStart.classList.toggle("open");
};


powerButton.onclick=(e)=>{
    e.stopPropagation();
    powerMenu.classList.toggle("open");
};

document.addEventListener("click",(e)=>{

    if(!newStart.contains(e.target) && !startButton.contains(e.target)){
        
        if(powerMenu.classList.contains("open")){
        powerMenu.classList.remove("open");
        }else{
        newStart.classList.remove("open");
}

    }

});


document.addEventListener("keydown",(e)=>{
    if(e.key==="Meta" || e.key==="OS" || e.key==="Win"){
        newStart.classList.remove("open");
        powerMenu.style.display="none";
    }
});


</script>
