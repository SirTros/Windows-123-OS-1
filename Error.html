<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Windows Error</title>

<style>

html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000000;
    color:white;
    overflow:hidden;
    cursor:none;
    user-select:none;
    font-family:"Segoe UI Variable","Segoe UI",Arial,sans-serif;
}


#screen{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}


#main{
    font-size:42px;
    font-weight:600;
    max-width:1000px;
    line-height:1.3;
}


#percent{
    margin-top:35px;
    font-size:26px;
    font-weight:400;
}


#stop{
    position:absolute;
    bottom:35px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
    color:white;
    font-family:"Segoe UI Variable","Segoe UI",Arial,sans-serif;
}


</style>

</head>


<body>


<div id="screen">

    <div id="main">
        Your PC ran into a problem and needs to restart.
    </div>


    <div id="percent">
        0% complete
    </div>

</div>



<div id="stop">
    Stop code: UNKNOWN_ERROR
</div>



<script>

let stopCode = "UNKNOWN_ERROR";

const url = window.location.search;

if(url.includes("cpu")){
    stopCode = "SYSTEM_CPU_OVERLOAD";
}
else if(url.includes("ui")){
    stopCode = "USER_INTERFACE_ERROR";
}
else if(localStorage.getItem("error_code")){
    stopCode = localStorage.getItem("error_code");
}


document.getElementById("stop").innerHTML =
"Stop code: " + stopCode;


let progress = 0;

setInterval(()=>{

    if(progress < 100){

        progress += 10;

        document.getElementById("percent").innerHTML =
        progress + "% complete";

    } else {

        window.location.href = "Restartovani.html";

    }

},1000);


</script>


</body>
</html>
