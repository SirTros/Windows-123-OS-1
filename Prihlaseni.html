<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Windows123</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
  background-color: #008000;
  color: white;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden;
  user-select: none;
}

/* čas */
#time {
  font-size: 80px;
  font-weight: 600;
}
#date {
  font-size: 28px;
  margin-bottom: 60px;
  font-weight: 600;
}

/* overlay */
#overlay {
  position: fixed;
  top: 100%;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(6px);
  transition: top 0.4s ease;
  z-index: 100;
}

/* horní lišta */
#closeBar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: #333;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* user */
#userImage {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  margin-bottom: 20px;
  background: white;
}
#userName {
  font-size: 24px;
  margin-bottom: 30px;
}
#signInBtn {
  font-size: 24px;
  padding: 12px 30px;
  border: none;
  background: white;
  cursor: pointer;
}

/* DRAG AREA */
#dragArea {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 50%;
  z-index: 50;
}

/* START BUTTON */
#pcButton {
  position: fixed;
  right: 20px;
  bottom: 20px;
  font-size: 28px;
  background: #008000;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 10;
}
</style>
</head>

<body>

<div id="time"></div>
<div id="date"></div>

<div id="pcButton">⏻</div>

<div id="overlay">
  <div id="closeBar">LOCK SCREEN</div>
  <img id="userImage" src="Pictures/User.png" />
  <div id="userName">USER</div>
  <button id="signInBtn">Sign in</button>
</div>

<!-- DRAG ZONE -->
<div id="dragArea"></div>

<script>
const overlay = document.getElementById("overlay");
const dragArea = document.getElementById("dragArea");

let isDragging = false;
let startY = 0;
let startTop = 100;

/* time */
function updateTime(){
  const now = new Date();
  document.getElementById("time").innerText =
    String(now.getHours()).padStart(2,'0') + ":" +
    String(now.getMinutes()).padStart(2,'0');

  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("date").innerText =
    now.getDate() + " " + months[now.getMonth()] + " " + now.getFullYear();
}
setInterval(updateTime,1000);
updateTime();

/* helper */
function getY(e){
  return e.touches ? e.touches[0].clientY : e.clientY;
}

/* START DRAG */
dragArea.addEventListener("mousedown", startDrag);
dragArea.addEventListener("touchstart", startDrag);

document.addEventListener("mousemove", moveDrag);
document.addEventListener("touchmove", moveDrag);

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

function startDrag(e){
  isDragging = true;
  startY = getY(e);
  startTop = parseFloat(overlay.style.top || "100");
  overlay.style.transition = "none";
}

function moveDrag(e){
  if(!isDragging) return;

  let y = getY(e);
  let delta = startY - y;

  let percent = startTop - (delta / window.innerHeight) * 100;

  if(percent < 0) percent = 0;
  if(percent > 100) percent = 100;

  overlay.style.top = percent + "%";
}

function endDrag(){
  if(!isDragging) return;
  isDragging = false;

  overlay.style.transition = "top 0.3s ease";

  let top = parseFloat(overlay.style.top || "100");

  if(top < 60){
    overlay.style.top = "0%";
  } else {
    overlay.style.top = "100%";
  }
}

/* sign in */
document.getElementById("signInBtn").onclick = () => {
  overlay.style.display = "none";
};
</script>

</body>
</html>
